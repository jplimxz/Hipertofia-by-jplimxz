<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infográfico de Medidas - Rayssa Yassue</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            500: '#ec4899',
                            600: '#db2777',
                            900: '#831843',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        /* Estilos de Impressão */
        @media print {
            body {
                background-color: white;
            }
            .no-print {
                display: none !important;
            }
            .print-full {
                width: 100% !important;
                max-width: none !important;
            }
            .print-shadow-none {
                box-shadow: none !important;
                border: 1px solid #e5e7eb;
            }
        }
        
        /* Animação suave para atualização dos números */
        .value-update {
            animation: pulse-pink 0.5s ease-out;
        }
        @keyframes pulse-pink {
            0% { color: #db2777; transform: scale(1.1); }
            100% { color: inherit; transform: scale(1); }
        }

        /* Linhas conectoras do mapa (visual estético) */
        .connector-line {
            position: absolute;
            background-color: #fce7f3;
            z-index: 0;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Cabeçalho -->
        <header class="bg-gradient-to-r from-brand-600 to-brand-500 rounded-2xl shadow-lg p-6 md:p-8 mb-8 text-white flex flex-col md:flex-row justify-between items-center print-shadow-none">
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm border-2 border-white/50">
                    <i class="ph ph-user text-4xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold mb-1">Rayssa Yassue</h1>
                    <div class="flex flex-wrap gap-4 text-brand-50 text-sm md:text-base">
                        <span class="flex items-center gap-1"><i class="ph ph-calendar-blank"></i> Nasc: 02/11/2006</span>
                        <span class="flex items-center gap-1"><i class="ph ph-calendar-check"></i> Avaliação: <span id="dataAtual"></span></span>
                    </div>
                </div>
            </div>
            <button onclick="window.print()" class="no-print mt-6 md:mt-0 bg-white text-brand-600 hover:bg-brand-50 font-semibold py-2 px-6 rounded-full transition-colors flex items-center gap-2 shadow-sm">
                <i class="ph ph-printer"></i> Imprimir / PDF
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Painel de Entrada de Dados (Escondido na Impressão) -->
            <div class="lg:col-span-4 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 no-print">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-gray-700">
                    <i class="ph ph-pencil-line text-brand-500"></i>
                    Inserir Medidas
                </h2>

                <form id="medidasForm" class="space-y-6">
                    <!-- Tronco -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Tronco (cm)</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Tórax</label>
                                <input type="number" id="input-torax" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Cintura</label>
                                <input type="number" id="input-cintura" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Abdômen</label>
                                <input type="number" id="input-abdomen" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Quadril</label>
                                <input type="number" id="input-quadril" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                        </div>
                    </div>

                    <!-- Membros Superiores -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Membros Superiores (cm)</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Braço Esq.</label>
                                <input type="number" id="input-braco-esq" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Braço Dir.</label>
                                <input type="number" id="input-braco-dir" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                        </div>
                    </div>

                    <!-- Membros Inferiores -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Membros Inferiores (cm)</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Perna Esq.</label>
                                <input type="number" id="input-perna-esq" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Perna Dir.</label>
                                <input type="number" id="input-perna-dir" step="0.1" class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="0.0">
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Mapa Visual do Infográfico -->
            <div class="lg:col-span-8 bg-white rounded-2xl shadow-sm border border-gray-100 p-8 print-full flex flex-col items-center justify-center min-h-[600px] relative overflow-hidden">
                
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-8 w-full print:block no-print">
                    Mapa de Circunferências
                </h2>

                <!-- Layout Anatômico dos Cartões -->
                <div class="relative w-full max-w-2xl mx-auto flex flex-col items-center gap-6 z-10">
                    
                    <!-- Fundo abstrato do corpo -->
                    <div class="absolute inset-0 flex justify-center z-0 opacity-10 pointer-events-none">
                        <div class="w-32 h-[500px] bg-brand-500 rounded-full blur-3xl"></div>
                    </div>

                    <!-- Linha 1: Tórax -->
                    <div class="flex justify-center w-full z-10">
                        <div class="bg-white border-2 border-brand-100 rounded-xl p-4 shadow-sm w-48 text-center relative overflow-hidden group hover:border-brand-300 transition-colors">
                            <div class="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                            <span class="block text-xs font-semibold text-brand-600 uppercase mb-1">Tórax</span>
                            <div class="text-3xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-torax">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>
                    </div>

                    <!-- Linha 2: Braços e Cintura -->
                    <div class="flex justify-between items-center w-full z-10 px-4 md:px-0">
                        <!-- Braço Esquerdo -->
                        <div class="bg-white border-2 border-indigo-100 rounded-xl p-4 shadow-sm w-36 md:w-40 text-center relative">
                            <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                            <span class="block text-xs font-semibold text-indigo-600 uppercase mb-1">Braço Esq.</span>
                            <div class="text-2xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-braco-esq">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>

                        <!-- Cintura -->
                        <div class="bg-white border-2 border-brand-100 rounded-xl p-4 shadow-sm w-48 text-center relative mx-4">
                            <div class="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                            <span class="block text-xs font-semibold text-brand-600 uppercase mb-1">Cintura</span>
                            <div class="text-3xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-cintura">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>

                        <!-- Braço Direito -->
                        <div class="bg-white border-2 border-indigo-100 rounded-xl p-4 shadow-sm w-36 md:w-40 text-center relative">
                            <div class="absolute top-0 right-0 w-1 h-full bg-indigo-500"></div>
                            <span class="block text-xs font-semibold text-indigo-600 uppercase mb-1">Braço Dir.</span>
                            <div class="text-2xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-braco-dir">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>
                    </div>

                    <!-- Linha 3: Abdômen -->
                    <div class="flex justify-center w-full z-10">
                        <div class="bg-white border-2 border-brand-100 rounded-xl p-4 shadow-sm w-48 text-center relative">
                            <div class="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                            <span class="block text-xs font-semibold text-brand-600 uppercase mb-1">Abdômen</span>
                            <div class="text-3xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-abdomen">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>
                    </div>

                    <!-- Linha 4: Quadril -->
                    <div class="flex justify-center w-full z-10">
                        <div class="bg-white border-2 border-brand-100 rounded-xl p-4 shadow-sm w-56 text-center relative">
                            <div class="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                            <span class="block text-xs font-semibold text-brand-600 uppercase mb-1">Quadril</span>
                            <div class="text-3xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-quadril">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>
                    </div>

                    <!-- Linha 5: Pernas -->
                    <div class="flex justify-center gap-8 md:gap-16 w-full z-10 mt-4">
                        <!-- Perna Esquerda -->
                        <div class="bg-white border-2 border-teal-100 rounded-xl p-4 shadow-sm w-40 md:w-48 text-center relative">
                            <div class="absolute top-0 left-0 w-1 h-full bg-teal-500"></div>
                            <span class="block text-xs font-semibold text-teal-600 uppercase mb-1">Perna Esq.</span>
                            <div class="text-3xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-perna-esq">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>

                        <!-- Perna Direita -->
                        <div class="bg-white border-2 border-teal-100 rounded-xl p-4 shadow-sm w-40 md:w-48 text-center relative">
                            <div class="absolute top-0 right-0 w-1 h-full bg-teal-500"></div>
                            <span class="block text-xs font-semibold text-teal-600 uppercase mb-1">Perna Dir.</span>
                            <div class="text-3xl font-bold text-gray-800 flex justify-center items-baseline gap-1">
                                <span id="display-perna-dir">0.0</span> <span class="text-sm font-normal text-gray-400">cm</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // Configurar a data atual no cabeçalho
        const dataAtualSpan = document.getElementById('dataAtual');
        const hoje = new Date();
        dataAtualSpan.textContent = hoje.toLocaleDateString('pt-BR');

        // Mapeamento dos inputs para os displays correspondentes
        const mapCampos = [
            { inputId: 'input-torax', displayId: 'display-torax' },
            { inputId: 'input-cintura', displayId: 'display-cintura' },
            { inputId: 'input-abdomen', displayId: 'display-abdomen' },
            { inputId: 'input-quadril', displayId: 'display-quadril' },
            { inputId: 'input-braco-esq', displayId: 'display-braco-esq' },
            { inputId: 'input-braco-dir', displayId: 'display-braco-dir' },
            { inputId: 'input-perna-esq', displayId: 'display-perna-esq' },
            { inputId: 'input-perna-dir', displayId: 'display-perna-dir' }
        ];

        // Adicionar event listeners a todos os inputs
        mapCampos.forEach(campo => {
            const inputEl = document.getElementById(campo.inputId);
            const displayEl = document.getElementById(campo.displayId);

            inputEl.addEventListener('input', function(e) {
                // Pega o valor e formata com 1 casa decimal, ou '0.0' se estiver vazio
                let valor = parseFloat(e.target.value);
                
                if (isNaN(valor)) {
                    displayEl.textContent = '0.0';
                } else {
                    displayEl.textContent = valor.toFixed(1);
                }

                // Remove e readiciona a classe de animação para dar feedback visual
                displayEl.classList.remove('value-update');
                // Trigger reflow para reiniciar a animação
                void displayEl.offsetWidth; 
                displayEl.classList.add('value-update');
            });
        });
    </script>
</body>
</html>
